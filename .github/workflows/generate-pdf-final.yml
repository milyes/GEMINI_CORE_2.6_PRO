name: "Documentation PDF Generation (Final Version V5.0)"

on:
  workflow_run:
    workflows: ["Autonomy & Integrity Pipeline V4.1 (Certification Continue)"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    name: "Extraction MMD & Compilation PDF Souverain"
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: 1. Clonage du Dépôt
        uses: actions/checkout@v4

      - name: 2. Installation de Node.js (Version LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Installation de Mermaid CLI (mmdc)
        run: |
          npm install -g @mermaid-js/mermaid-cli

      - name: 4. Traitement du Diagramme Mermaid (Workflow V5.0)
        run: |
          mkdir -p images
          if [ -f "documentation_officielle.md" ]; then
            mmdc -i documentation_officielle.md -o images/flux-integrite-v3.svg -t dark -b transparent
          else
            echo "[ALERTE] documentation_officielle.md introuvable"
          fi

      - name: 5. Installation de Pandoc & WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc weasyprint

      - name: 6. Génération du Document Markdown Institutionnel
        env:
          CURRENT_DATE: $(date +'%Y-%m-%d')
        run: |
          cat << 'INNER_EOF' > GEMINI_CORE_2.6_PRO_DOCS_OFFICIEL_v2.6.md
          ---
          title: "DOCUMENTATION OFFICIELLE : GEMINI CORE 2.6 PRO"
          author: "Zoubirou Mohammed Ilyes (ORCID: 0009-0007-7571-3178)"
          date: "${{ env.CURRENT_DATE }}"
          ---

          # 1. Fiche Technique Institutionnelle & Traçabilité
          Ce module représente le standard de traçabilité le plus élevé, validé par des contrôles d'intégrité cryptographique continus.

          | Champ | Valeur Officielle | Rôle de Traçabilité |
          | :--- | :--- | :--- |
          | **Nom du Module** | GEMINI CORE 2.6 PRO | Identifiant du système. |
          | **Version** | 2.6 | Clé de vérification du pipeline. |
          | **Auteur Officiel** | Zoubirou Mohammed Ilyes | Nom pour l'archivage formel. |
          | **ORCID Officiel** | 0009-0007-7571-3178 | Identifiant de chercheur standard ISO (ORCID). |
          | **État de Certification** | Publication Officielle (Sceau Vérifié) | Statut critique pour le déploiement. |

          # 2. Architecture de Certification Continue (CI/CD)
          Le module est sécurisé par un pipeline d'auto-certification qui gagne l'intégrité de bout en bout. Le diagramme ci-dessous illustre le processus totalement autonome et traçable.

          ### Schéma du Flux d'Intégrité (Version Ultra-Visuelle V3.0)
          ![Flux d'Intégrité](./images/flux-integrite-v3.svg)
          INNER_EOF

      - name: 7. Compilation du PDF Officiel
        run: |
          pandoc GEMINI_CORE_2.6_PRO_DOCS_OFFICIEL_v2.6.md \
            -o GEMINI_CORE_2.6_PRO_DOCS_OFFICIEL_v2.6.pdf \
            --pdf-engine=weasyprint

      - name: 8. Archivage Formel du Livrable (Sceau Vérifié)
        uses: actions/upload-artifact@v4
        with:
          name: GEMINI_CORE_2.6_PRO_PDF
          path: GEMINI_CORE_2.6_PRO_DOCS_OFFICIEL_v2.6.pdf

      - name: 9. Publication Automatique de l'Artefact Certifié
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Pipeline"
          git add GEMINI_CORE_2.6_PRO_DOCS_OFFICIEL_v2.6.pdf
          git commit -m "chore(pdf): archivage officiel - GEMINI CORE 2.6 PRO [skip ci]" || echo "Aucun changement détecté"
          git push
